version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: airx-postgis
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: airx
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Mount the schema file to initialize the database automatically on first run
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  pg_data:
